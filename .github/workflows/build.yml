name: Apple Silicon Assembly CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"  # Triggers the workflow when you push a tag like v1.0.0
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-14 

    # REQUIRED: Grant the runner permission to write to your repository 
    # so it can automatically generate the Release page.
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Project
        run: make

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-benchmark-mac-arm64
          path: asm-prime-bench
          retention-days: 5

      # ── NEW STEP: Create the Release ──
      - name: Publish GitHub Release
        # This ensures the release ONLY happens if triggered by a tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: asm-prime-bench  # Attaches your compiled binary to the release
          generate_release_notes: true # Automatically lists the commits since the last tag
